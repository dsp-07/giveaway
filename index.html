<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Giveaway Portal</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f0c29;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 2rem; margin-bottom: 10px; letter-spacing: -1px; }
        p { color: #ccc; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5; }

        .input-box { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--primary); font-weight: 600; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }

        .footer-text { margin-top: 25px; font-size: 0.75rem; color: rgba(255,255,255,0.3); }
        a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎁 Giveaway</h1>
        <p>Enter your details below to join the lucky draw. One winner will be picked randomly!</p>
        
        <form action="/register" method="POST">
            <div class="input-box">
                <label>Your Full Name</label>
                <input type="text" name="name" placeholder="e.g. John Doe" required>
            </div>
            <div class="input-box">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="e.g. john@example.com" required>
            </div>
            <button type="submit">Enter Now</button>
        </form>

        <div class="footer-text">
            <a href="/admin-dashboard">Admin Access Only</a>
        </div>
    </div>
</body>
</html>
