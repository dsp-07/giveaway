<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Giveaway</title>
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #0a0a0c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, #1a1a2e 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #16213e 0%, transparent 40%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Floating background elements */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p { color: #888; margin-bottom: 30px; font-weight: 300; }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 15px;
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.4s;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--accent);
            filter: brightness(1.1);
        }

        .admin-link {
            display: block;
            margin-top: 30px;
            color: #444;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .admin-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="orb"></div>
    
    <div class="glass-container">
        <h1>ENTRY PORTAL</h1>
        <p>Phase 01: Connect to Win</p>
        
        <form action="/register" method="POST">
            <div class="input-wrapper">
                <input type="text" name="name" placeholder="IDENTIFIER (NAME)" required>
            </div>
            <div class="input-wrapper">
                <input type="email" name="email" placeholder="COMMS (EMAIL)" required>
            </div>
            <button type="submit">Initialize Entry</button>
        </form>

        <a href="/admin-dashboard" class="admin-link">AUTHORIZED PERSONNEL ONLY</a>
    </div>
</body>
</html>
